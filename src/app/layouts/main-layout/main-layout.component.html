<mat-sidenav-container class="layout-container">

  <!-- Sidebar -->

  <mat-sidenav
    #drawer
    mode="side"
    opened
    class="sidebar">

    <div class="logo">
      IIB Portal
    </div>

    <mat-nav-list>

        <a mat-list-item routerLink="/dashboard">
        <mat-icon>dashboard</mat-icon>
        Dashboard
        </a>

        <a mat-list-item routerLink="/dashboardv1">
        <mat-icon>dashboard</mat-icon>
        Dashboard v1
        </a>

      <a mat-list-item routerLink="/reports">
        <mat-icon>description</mat-icon>
        Reports
      </a>

      <a mat-list-item routerLink="/analytics">
        <mat-icon>analytics</mat-icon>
        Analytics
      </a>

      <a mat-list-item routerLink="/monitoring">
        <mat-icon>monitor</mat-icon>
        Monitoring
      </a>

      <a mat-list-item routerLink="/validation">
        <mat-icon>verified</mat-icon>
        Validation
      </a>

      <a mat-list-item routerLink="/audit">
        <mat-icon>history</mat-icon>
        Audit
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- Main Content -->

  <mat-sidenav-content>

    <mat-toolbar class="toolbar">

      <button mat-icon-button>
        <mat-icon>menu</mat-icon>
      </button>

      <span class="title">
        IIB Monitoring Portal
      </span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>

      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>

    </mat-toolbar>

    <div class="content">

      <router-outlet></router-outlet>

    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
